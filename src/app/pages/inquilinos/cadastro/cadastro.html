<div class="inquilino-page">
  <section class="page-hero">
    <div>
      <span class="tag">Cadastro</span>
      <h1>Cadastrar Inquilino</h1>
      <p>Registre os dados do inquilino e mantenha o vínculo com o imóvel organizado.</p>
    </div>

    <button
      pButton
      label="Voltar"
      icon="pi pi-arrow-left"
      class="p-button-outlined"
      routerLink="/inquilinos"
    ></button>
  </section>

  <section class="form-card">
    <div class="form-grid">
      <div class="field">
        <label>Nome</label>
        <input
          pInputText
          [(ngModel)]="nome"
          placeholder="Ex: João Silva"
          class="w-full"
        />
      </div>

      <div class="field">
        <label>Contato</label>
        <input
          pInputText
          [(ngModel)]="contato"
          placeholder="Ex: (47) 99999-1111"
          class="w-full"
        />
      </div>

      <div class="field">
        <label>Documento</label>
        <input
          pInputText
          [(ngModel)]="documento"
          placeholder="Ex: 123.456.789-00"
          class="w-full"
        />
      </div>

      <div class="field">
        <label>Quantidade de pessoas na casa</label>
        <input
          pInputText
          type="number"
          [(ngModel)]="pessoas"
          min="1"
          placeholder="Ex: 3"
          class="w-full"
        />
      </div>

      <div class="field">
        <label>Status do pagamento</label>
        <p-select
          [options]="statusList"
          [(ngModel)]="statusPagamento"
          placeholder="Selecione o status"
          class="w-full"
          fluid
        ></p-select>
      </div>

      <div class="field field-full">
        <label>Observação</label>
        <textarea
          [(ngModel)]="observacao"
          rows="4"
          placeholder="Ex: Inquilino entrou em março, possui 3 moradores..."
          class="textarea"
        ></textarea>
      </div>
    </div>

    <div class="actions">
      <button
        pButton
        label="Salvar"
        icon="pi pi-check"
        class="p-button-success"
        (click)="salvar()"
      ></button>

      <button
        pButton
        label="Cancelar"
        icon="pi pi-times"
        class="p-button-secondary"
        (click)="cancelar()"
      ></button>
    </div>
  </section>
</div>
