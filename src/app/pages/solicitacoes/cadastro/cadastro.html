<div class="solicitacao-page">
  <section class="page-hero">
    <div>
      <span class="tag">Cadastro</span>
      <h1>Cadastrar Solicitação</h1>
      <p>Registre serviços, manutenções e custos vinculados aos imóveis.</p>
    </div>

    <button
      pButton
      label="Voltar"
      icon="pi pi-arrow-left"
      class="p-button-outlined"
      routerLink="/solicitacoes"
    ></button>
  </section>

  <section class="form-card">
    <div class="form-grid">
      <div class="field">
        <label>Tipo de Serviço</label>
        <p-select
          [options]="servicosList"
          [(ngModel)]="tipoServico"
          placeholder="Selecione o serviço"
          class="w-full"
          fluid
        ></p-select>
      </div>

      <div class="field">
        <label>Data</label>
        <p-datepicker
          [(ngModel)]="data"
          dateFormat="dd/mm/yy"
          placeholder="Selecione a data"
          class="w-full"
          fluid
        ></p-datepicker>
      </div>

      <div class="field">
        <label>Custo</label>
        <input
          pInputText
          type="number"
          [(ngModel)]="custo"
          placeholder="Ex: 250"
          class="w-full"
        />
      </div>

      <div class="field">
        <label>Status</label>
        <p-select
          [options]="statusList"
          [(ngModel)]="status"
          placeholder="Selecione o status"
          class="w-full"
          fluid
        ></p-select>
      </div>

      <div class="field field-full">
        <label>Observação</label>
        <textarea
          [(ngModel)]="observacao"
          rows="4"
          placeholder="Ex: Troca de torneira, pintura da sala, corte de grama..."
          class="textarea"
        ></textarea>
      </div>
    </div>

    <div class="actions">
      <button
        pButton
        label="Salvar"
        icon="pi pi-check"
        class="p-button-success"
        (click)="salvar()"
      ></button>

      <button
        pButton
        label="Cancelar"
        icon="pi pi-times"
        class="p-button-secondary"
        (click)="cancelar()"
      ></button>
    </div>
  </section>
</div>
