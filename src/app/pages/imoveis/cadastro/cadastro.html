<div class="imovel-page">
  <section class="page-hero">
    <div>
      <span class="tag">Cadastro</span>
      <h1>Cadastrar Imóvel</h1>
      <p>Adicione uma nova casa ao sistema e mantenha suas informações organizadas.</p>
    </div>

    <button
      pButton
      label="Voltar"
      icon="pi pi-arrow-left"
      class="p-button-outlined"
      routerLink="/imoveis"
    ></button>
  </section>

  <section class="form-card">
    <div class="form-grid">
      <div class="field">
        <label>Nome</label>
        <input pInputText [(ngModel)]="nome" placeholder="Ex: Casa Azul" class="w-full" />
      </div>

      <div class="field">
        <label>Endereço</label>
        <input pInputText [(ngModel)]="endereco" placeholder="Ex: Rua das Flores, 45" class="w-full" />
      </div>

      <div class="field">
        <label>Status</label>
        <p-select
          [options]="statusList"
          [(ngModel)]="status"
          placeholder="Selecione um status"
          class="w-full"
          fluid
        ></p-select>
      </div>

      <div class="field">
        <label>Cor da Casa</label>
        <input pInputText [(ngModel)]="cor" placeholder="Ex: Azul claro" class="w-full" />
      </div>

      <div class="field">
        <label>Garagem</label>
        <select [(ngModel)]="garagem" class="input-select">
          <option value="" disabled selected>Possui garagem?</option>
          <option value="Sim">Sim</option>
          <option value="Não">Não</option>
        </select>
      </div>

      <div class="field">
        <label>Quantidade de Quartos</label>
        <input pInputText type="number" [(ngModel)]="quartos" min="0" class="w-full" />
      </div>

      <div class="field">
        <label>Quantidade de Banheiros</label>
        <input pInputText type="number" [(ngModel)]="banheiros" min="0" class="w-full" />
      </div>

      <div class="field">
        <label>Foto do Imóvel</label>
        <input type="file" accept="image/*" (change)="onFileSelected($event)" class="file-input" />

        <div *ngIf="imagem" class="preview">
          <img [src]="imagem" alt="Pré-visualização da casa" class="preview-img" />
        </div>
      </div>
    </div>

    <div class="actions">
      <button
        pButton
        label="Salvar"
        icon="pi pi-check"
        class="p-button-success"
        (click)="salvar()"
      ></button>

      <button
        pButton
        label="Cancelar"
        icon="pi pi-times"
        class="p-button-secondary"
        (click)="cancelar()"
      ></button>
    </div>
  </section>
</div>
